<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Board Game Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    background: linear-gradient(135deg, #16213e, #0f3460);
    padding: 20px 16px 16px;
    text-align: center;
    border-bottom: 2px solid #e94560;
  }

  .header h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .header p  { font-size: 12px; color: #a0a0c0; margin-top: 2px; }

  .form-body { padding: 16px; max-width: 480px; margin: 0 auto; }

  .section {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid #0f3460;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #e94560;
    margin-bottom: 12px;
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  label { display: block; font-size: 13px; font-weight: 600; color: #a0b0d0; margin-bottom: 5px; }

  input[type="text"], input[type="number"], input[type="date"], select {
    width: 100%;
    background: #0f3460;
    border: 1px solid #1a4a80;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 15px;
    padding: 10px 12px;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus { outline: none; border-color: #e94560; }
  input[readonly] { opacity: 0.7; cursor: default; }

  .auto-field { display: flex; gap: 8px; }

  .stat-box {
    flex: 1;
    background: #0f3460;
    border: 1px solid #1a4a80;
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }

  .stat-label { font-size: 10px; color: #7090b0; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 15px; font-weight: 700; color: #e0e0e0; margin-top: 2px; }

  .chip-container {
    background: #0f3460;
    border: 1px solid #1a4a80;
    border-radius: 8px;
    padding: 8px;
    min-height: 44px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    cursor: pointer;
  }

  .chip {
    background: #e94560;
    color: #fff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .chip .remove { font-size: 16px; line-height: 1; opacity: 0.8; cursor: pointer; }
  .chip-placeholder { color: #506080; font-size: 14px; padding: 2px 4px; }

  /* Two-column score grid */
  .scores-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .score-cell {
    background: #0f3460;
    border: 1px solid #1a4a80;
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .score-cell-name {
    font-size: 12px;
    font-weight: 600;
    color: #a0b0d0;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
    text-align: center;
  }

  .score-cell input {
    width: 100% !important;
    background: transparent !important;
    border: none !important;
    border-bottom: 1px solid #1a4a80 !important;
    border-radius: 0 !important;
    padding: 4px 6px !important;
    font-size: 18px !important;
    font-weight: 700 !important;
    text-align: center !important;
    color: #e0e0e0 !important;
  }

  .score-cell input:focus { outline: none; border-bottom-color: #e94560 !important; }
  .score-cell input[readonly] { color: #506080 !important; opacity: 1 !important; }

  .dropdown-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: flex-end;
  }

  .dropdown-overlay.open { display: flex; }

  .dropdown-sheet {
    background: #16213e;
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 70vh;
    overflow-y: auto;
    padding: 16px;
    border-top: 2px solid #e94560;
  }

  .dropdown-sheet h3 { font-size: 14px; font-weight: 700; color: #e0e0e0; margin-bottom: 12px; text-align: center; }

  .dropdown-option {
    padding: 12px;
    border-radius: 8px;
    font-size: 15px;
    color: #e0e0e0;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dropdown-option:active { background: #0f3460; }
  .dropdown-option.selected { background: #1a3a60; color: #e94560; font-weight: 600; }

  .dropdown-option .check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid #506080;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 11px;
  }

  .dropdown-option.selected .check { background: #e94560; border-color: #e94560; color: white; }

  .dropdown-done {
    margin-top: 12px; width: 100%;
    background: #e94560; color: white;
    border: none; border-radius: 8px;
    padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
  }

  .game-specific { display: none; }
  .game-specific.visible { display: block; }

  .status-banner {
    display: none;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 12px;
    text-align: center;
  }

  .status-banner.visible { display: block; background: #0f3460; border: 1px solid #1a4a80; color: #a0c0e0; }
  .status-banner.error   { background: #3a0f1e !important; border-color: #e94560 !important; color: #ff8080 !important; }
  .status-banner.success { background: #0f3a1e !important; border-color: #40e094 !important; color: #80ffb0 !important; }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #e94560, #c03050);
    color: white; border: none; border-radius: 12px;
    padding: 16px; font-size: 17px; font-weight: 700;
    letter-spacing: 0.5px; cursor: pointer; margin-top: 4px;
  }

  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Recent plays table */
  .recent-row td {
    padding: 8px 4px;
    font-size: 13px;
    border-bottom: 1px solid #0f3460;
    vertical-align: middle;
  }
  .recent-row:last-child td { border-bottom: none; }
  .recent-header td {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #e94560;
    padding: 0 4px 8px;
  }
  .recent-date { color: #7090b0; }
  .recent-winner { color: #e0e0e0; font-weight: 600; }
  .recent-score { color: #a0b0d0; text-align: right; }
</style>
</head>
<body>

<div class="header">
  <h1>🎲 Board Game Tracker</h1>
  <p>Log your session</p>
</div>

<div class="form-body">

  <div class="status-banner" id="statusBanner"></div>

  <!-- Session -->
  <div class="section">
    <div class="section-title">Session</div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="fieldDate">
    </div>
    <div class="field">
      <label>Board Game</label>
      <select id="fieldGame" onchange="onGameChange()">
        <option value="">Loading games…</option>
      </select>
    </div>
  </div>

  <!-- Game History -->
  <div class="section" id="sectionStats" style="display:none">
    <div class="section-title">Game History</div>
    <div class="auto-field">
      <div class="stat-box"><div class="stat-label">Last Played</div><div class="stat-value" id="valLastPlayed">—</div></div>
      <div class="stat-box"><div class="stat-label">Total Plays</div><div class="stat-value" id="valTotalPlays">—</div></div>
      <div class="stat-box"><div class="stat-label">Top Winner</div><div class="stat-value" id="valTopWinner">—</div></div>
    </div>
  </div>

  <!-- SETI specific -->
  <div class="section game-specific" id="section-SETI">
    <div class="section-title">SETI Details</div>
    <div class="field">
      <label>Expansion</label>
      <select id="seti-expansion">
        <option value="">Select…</option>
        <option>Space Agencies</option>
        <option>None</option>
      </select>
    </div>
    <div class="field">
      <label>Revealed Aliens</label>
      <div class="chip-container" id="setiAliensContainer" onclick="openMultiSelect('setiAliens')">
        <span class="chip-placeholder" id="setiAliensPlaceholder">Select aliens…</span>
      </div>
    </div>
  </div>

  <!-- Dorfromantik specific -->
  <div class="section game-specific" id="section-Dorfromantik">
    <div class="section-title">Dorfromantik Details</div>
    <div class="field">
      <label>Version</label>
      <select id="dorf-version">
        <option value="">Select…</option>
        <option>Original</option>
        <option>Sakura</option>
        <option>The Duel</option>
        <option>Light Luggage</option>
      </select>
    </div>
  </div>

  <!-- Players -->
  <div class="section">
    <div class="section-title">Players</div>
    <div class="chip-container" id="playersContainer" onclick="openMultiSelect('players')">
      <span class="chip-placeholder" id="playersPlaceholder">Select players…</span>
    </div>
  </div>

  <!-- Result -->
  <div class="section" id="resultSection" style="display:none">
    <div class="section-title">Result</div>
    <div class="scores-grid" id="scoresContainer"></div>
    <div class="field">
      <label>Winner</label>
      <input type="text" id="fieldWinner" readonly placeholder="Auto-filled from scores…">
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitForm()">Submit Session</button>

  <!-- Recent Plays -->
  <div class="section" id="recentSection" style="margin-top:12px;display:none">
    <div class="section-title">Recent Plays</div>
    <table id="recentTable" style="width:100%;border-collapse:collapse"></table>
    <div id="loadMoreWrap" style="text-align:center;margin-top:10px;display:none">
      <a href="#" id="loadMoreLink" onclick="loadMore(event)" style="color:#e94560;font-size:13px;text-decoration:none">Load more…</a>
    </div>
  </div>

</div>

<!-- Multi-select overlay -->
<div class="dropdown-overlay" id="dropdownOverlay" onclick="closeDropdownIfOutside(event)">
  <div class="dropdown-sheet">
    <h3 id="dropdownTitle"></h3>
    <div id="dropdownOptions"></div>
    <button class="dropdown-done" onclick="closeMultiSelect()">Done</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwIqye5UJq_gaz8RVFQaQxiozN4t5LAjYOgoh_m2AlP3R7yzUOS0Msmn_KxVD-_2V4l/exec';
const ALIEN_OPTIONS = ["Anomalies", "'Omuamua", "Exertians", "Mascamites", "Centaurians"];

let allPlayers = [], allGames = [], selectedPlayers = [], selectedAliens = [];
let currentDropdown = null, currentGameData = null;

document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('fieldDate').value = `${yyyy}-${mm}-${dd}`;
  loadFromSheet();
});

async function loadFromSheet() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getConfig`);
    const data = await res.json();
    allGames = data.games;
    allPlayers = data.players;
    populateGameDropdown();
    loadRecentPlays();
  } catch(e) {
    showStatus('Could not load data from sheet. Check your Apps Script deployment.', true);
  }
}

function populateGameDropdown() {
  const sel = document.getElementById('fieldGame');
  sel.innerHTML = '<option value="">Select a game…</option>';
  allGames.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.name; opt.textContent = g.name;
    sel.appendChild(opt);
  });
}

async function onGameChange() {
  const gameName = document.getElementById('fieldGame').value;
  document.querySelectorAll('.game-specific').forEach(el => el.classList.remove('visible'));
  if (!gameName) { document.getElementById('sectionStats').style.display = 'none'; return; }

  const game = allGames.find(g => g.name === gameName);
  currentGameData = game;

  const specificSection = document.getElementById(`section-${getGameKey(gameName)}`);
  if (specificSection) specificSection.classList.add('visible');

  document.getElementById('sectionStats').style.display = 'block';
  ['valLastPlayed','valTotalPlays','valTopWinner'].forEach(id => document.getElementById(id).textContent = '…');

  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getStats&game=${encodeURIComponent(gameName)}`);
    const stats = await res.json();
    document.getElementById('valLastPlayed').textContent = stats.lastPlayed || '—';
    document.getElementById('valTotalPlays').textContent = stats.totalPlays ?? '0';
    document.getElementById('valTopWinner').textContent = stats.topWinner || '—';
  } catch(e) {
    ['valLastPlayed','valTotalPlays','valTopWinner'].forEach(id => document.getElementById(id).textContent = '—');
  }

  // Refresh scores if players already selected
  if (selectedPlayers.length > 0) updateScores();
}

function getGameKey(name) {
  if (name.startsWith('SETI')) return 'SETI';
  if (name === 'Dorfromantik') return 'Dorfromantik';
  return name.replace(/[^a-zA-Z0-9]/g,'');
}

function openMultiSelect(type) {
  currentDropdown = type;
  const items = type === 'players' ? allPlayers : ALIEN_OPTIONS;
  const selected = type === 'players' ? selectedPlayers : selectedAliens;
  document.getElementById('dropdownTitle').textContent = type === 'players' ? 'Select Players' : 'Revealed Aliens';
  const options = document.getElementById('dropdownOptions');
  options.innerHTML = '';
  items.forEach(item => {
    const isSelected = selected.includes(item);
    const div = document.createElement('div');
    div.className = 'dropdown-option' + (isSelected ? ' selected' : '');
    div.innerHTML = `<div class="check">${isSelected ? '✓' : ''}</div><span>${item}</span>`;
    div.onclick = () => toggleOption(div, item, type);
    options.appendChild(div);
  });
  document.getElementById('dropdownOverlay').classList.add('open');
}

function toggleOption(el, value, type) {
  const arr = type === 'players' ? selectedPlayers : selectedAliens;
  const idx = arr.indexOf(value);
  if (idx > -1) { arr.splice(idx, 1); el.classList.remove('selected'); el.querySelector('.check').textContent = ''; }
  else { arr.push(value); el.classList.add('selected'); el.querySelector('.check').textContent = '✓'; }
}

function closeMultiSelect() {
  document.getElementById('dropdownOverlay').classList.remove('open');
  if (currentDropdown === 'players') {
    renderChips('playersContainer', 'playersPlaceholder', selectedPlayers, 'players');
    updateScores();
  } else {
    renderChips('setiAliensContainer', 'setiAliensPlaceholder', selectedAliens, 'setiAliens');
  }
  currentDropdown = null;
}

function closeDropdownIfOutside(e) {
  if (e.target === document.getElementById('dropdownOverlay')) closeMultiSelect();
}

function renderChips(containerId, placeholderId, arr, type) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  if (arr.length === 0) {
    const ph = document.createElement('span');
    ph.className = 'chip-placeholder'; ph.id = placeholderId;
    ph.textContent = type === 'players' ? 'Select players…' : 'Select aliens…';
    container.appendChild(ph);
    return;
  }
  arr.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${item}<span class="remove" onclick="removeChip(event,'${item}','${type}')">×</span>`;
    container.appendChild(chip);
  });
}

function removeChip(e, value, type) {
  e.stopPropagation();
  if (type === 'players') {
    selectedPlayers = selectedPlayers.filter(p => p !== value);
    renderChips('playersContainer', 'playersPlaceholder', selectedPlayers, 'players');
    updateScores();
  } else {
    selectedAliens = selectedAliens.filter(a => a !== value);
    renderChips('setiAliensContainer', 'setiAliensPlaceholder', selectedAliens, 'setiAliens');
  }
}

function updateScores() {
  const resultSection = document.getElementById('resultSection');
  const container = document.getElementById('scoresContainer');

  if (selectedPlayers.length === 0) {
    resultSection.style.display = 'none';
    return;
  }

  resultSection.style.display = 'block';
  const isCoop = currentGameData?.coop || false;
  container.innerHTML = '';

  selectedPlayers.forEach(player => {
    const cell = document.createElement('div');
    cell.className = 'score-cell';
    const safeId = `score-${player.replace(/\s/g,'_')}`;
    cell.innerHTML = `
      <div class="score-cell-name">${player}</div>
      <input type="${isCoop ? 'text' : 'number'}"
             id="${safeId}"
             ${isCoop ? 'readonly value="N/A"' : 'placeholder="—"'}
             oninput="autoWinner()">
    `;
    container.appendChild(cell);
  });

  // Set winner field
  if (isCoop) {
    document.getElementById('fieldWinner').value = 'N/A';
  } else {
    document.getElementById('fieldWinner').value = '';
    document.getElementById('fieldWinner').placeholder = 'Auto-filled from scores…';
  }
}

function autoWinner() {
  if (currentGameData?.coop) return;

  const scores = {};
  selectedPlayers.forEach(p => {
    const val = document.getElementById(`score-${p.replace(/\s/g,'_')}`)?.value;
    if (val !== '' && val !== undefined) scores[p] = parseFloat(val);
  });

  const filled = Object.entries(scores).filter(([,v]) => !isNaN(v));
  if (filled.length === 0) { document.getElementById('fieldWinner').value = ''; return; }

  const maxScore = Math.max(...filled.map(([,v]) => v));
  const winners = filled.filter(([,v]) => v === maxScore).map(([p]) => p);

  if (winners.length === 1) {
    document.getElementById('fieldWinner').value = winners[0];
  } else {
    document.getElementById('fieldWinner').value = `TIE! ${winners.join(', ')}`;
  }
}

async function submitForm() {
  const game = document.getElementById('fieldGame').value;
  if (!game) { showStatus('Please select a game.', true); return; }
  if (selectedPlayers.length === 0) { showStatus('Please select at least one player.', true); return; }

  const winner = document.getElementById('fieldWinner').value;
  if (!winner) { showStatus('Please enter scores to determine a winner.', true); return; }

  const scores = {};
  selectedPlayers.forEach(p => {
    const val = document.getElementById(`score-${p.replace(/\s/g,'_')}`)?.value;
    if (val) scores[p] = val;
  });

  const payload = {
    date: document.getElementById('fieldDate').value,
    game,
    players: selectedPlayers.join(', '),
    scores: JSON.stringify(scores),
    winner,
    lastPlayed: document.getElementById('valLastPlayed').textContent,
    totalPlays: document.getElementById('valTotalPlays').textContent,
    topWinner: document.getElementById('valTopWinner').textContent,
  };

  const gameKey = getGameKey(game);
  if (gameKey === 'SETI') {
    payload.expansion = document.getElementById('seti-expansion').value;
    payload.revealedAliens = selectedAliens.join(', ');
  }
  if (gameKey === 'Dorfromantik') {
    payload.dorfVersion = document.getElementById('dorf-version').value;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';

  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const result = await res.json();
    if (result.status === 'success') { showStatus('✅ Session saved!', false, true); resetForm(); allSessions=[]; shownCount=0; loadRecentPlays(); }
    else throw new Error(result.message);
  } catch(e) {
    showStatus(`Error: ${e.message}`, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Session';
  }
}

function resetForm() {
  document.getElementById('fieldGame').value = '';
  document.getElementById('fieldWinner').value = '';
  selectedPlayers = []; selectedAliens = [];
  renderChips('playersContainer', 'playersPlaceholder', [], 'players');
  renderChips('setiAliensContainer', 'setiAliensPlaceholder', [], 'setiAliens');
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('sectionStats').style.display = 'none';
  document.querySelectorAll('.game-specific').forEach(el => el.classList.remove('visible'));
  currentGameData = null;
}

function showStatus(msg, isError = false, isSuccess = false) {
  const el = document.getElementById('statusBanner');
  el.textContent = msg;
  el.className = 'status-banner visible' + (isError ? ' error' : '') + (isSuccess ? ' success' : '');
  if (!isError) setTimeout(() => el.classList.remove('visible'), 4000);
}

// ─── RECENT PLAYS ────────────────────────────────────────
let allSessions = [];
let shownCount = 0;
const PAGE_SIZE = 5;

async function loadRecentPlays() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getSessions`);
    const data = await res.json();
    // Sort newest first
    allSessions = data.sessions.sort((a, b) => new Date(b.date) - new Date(a.date));
    shownCount = 0;
    renderRecentPlays();
  } catch(e) {
    // Silently fail — don't block the main form
  }
}

function renderRecentPlays() {
  const section = document.getElementById('recentSection');
  const table = document.getElementById('recentTable');
  const loadMoreWrap = document.getElementById('loadMoreWrap');

  if (allSessions.length === 0) { section.style.display = 'none'; return; }

  section.style.display = 'block';
  const toShow = allSessions.slice(0, shownCount + PAGE_SIZE);
  shownCount = toShow.length;

  table.innerHTML = '';

  // Header
  const header = document.createElement('tr');
  header.className = 'recent-header';
  header.innerHTML = '<td>Date</td><td>Game</td><td>Winner</td><td class="recent-score">Score</td>';
  table.appendChild(header);

  toShow.forEach(s => {
    const row = document.createElement('tr');
    row.className = 'recent-row';
    const date = s.date ? formatDate(s.date) : '—';
    const game = s.game ? shortenGame(s.game) : '—';
    const winner = s.winner || '—';
    const score = getWinnerScore(s) || '—';
    row.innerHTML = `
      <td class="recent-date">${date}</td>
      <td class="recent-date">${game}</td>
      <td class="recent-winner">${winner}</td>
      <td class="recent-score">${score}</td>
    `;
    table.appendChild(row);
  });

  loadMoreWrap.style.display = shownCount < allSessions.length ? 'block' : 'none';
}

function loadMore(e) {
  e.preventDefault();
  renderRecentPlays();
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short', year: '2-digit' });
}

function shortenGame(name) {
  if (name.startsWith('SETI')) return 'SETI';
  if (name.length > 14) return name.substring(0, 13) + '…';
  return name;
}

function getWinnerScore(session) {
  if (!session.scores || !session.winner) return '';
  if (session.winner.startsWith('TIE!') || session.winner === 'N/A') return '';
  try {
    const scores = JSON.parse(session.scores);
    const val = scores[session.winner];
    return val !== undefined ? val : '';
  } catch(e) { return ''; }
}
