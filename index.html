<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Board Game Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding-bottom: 40px;
    transition: background-color 0.6s ease;
  }

  .bg-art {
    position: fixed;
    top: 62px; /* below header */
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 0;
    background-size: cover;
    background-position: center top;
    filter: blur(6px) brightness(0.55) saturate(1.2);
    transform: scale(1.04);
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }

  .bg-art.visible { opacity: 1; }

  .header { position: relative; z-index: 2; }
  .form-body, .dropdown-overlay { position: relative; z-index: 1; }

  .header {
    background: linear-gradient(135deg, #16213e, #0f3460);
    padding: 20px 16px 16px;
    text-align: center;
    border-bottom: 2px solid #e94560;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .header p  { font-size: 12px; color: #a0a0c0; margin-top: 2px; }

  .form-body { padding: 16px; max-width: 480px; margin: 0 auto; }

  .section {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid #0f3460;
  }
  .section-title {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: #e94560; margin-bottom: 12px;
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  label { display: block; font-size: 13px; font-weight: 600; color: #a0b0d0; margin-bottom: 5px; }

  input[type="text"], input[type="number"], input[type="date"], select {
    width: 100%;
    background: #0f3460; border: 1px solid #1a4a80;
    border-radius: 8px; color: #e0e0e0;
    font-size: 15px; padding: 10px 12px;
    appearance: none; -webkit-appearance: none;
  }
  input:focus, select:focus { outline: none; border-color: #e94560; }
  input[readonly] { opacity: 0.7; cursor: default; }

  .auto-field { display: flex; gap: 8px; }
  .stat-box {
    flex: 1; background: #0f3460; border: 1px solid #1a4a80;
    border-radius: 8px; padding: 8px 10px; text-align: center;
  }
  .stat-label { font-size: 10px; color: #7090b0; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 15px; font-weight: 700; color: #e0e0e0; margin-top: 2px; }

  /* Chips */
  .chip-container {
    background: #0f3460; border: 1px solid #1a4a80;
    border-radius: 8px; padding: 8px; min-height: 44px;
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; cursor: pointer;
  }
  .chip {
    background: #e94560; color: #fff; border-radius: 20px;
    padding: 3px 10px; font-size: 13px;
    display: flex; align-items: center; gap: 5px;
  }
  .chip .remove { font-size: 16px; line-height: 1; opacity: 0.8; cursor: pointer; }
  .chip-placeholder { color: #506080; font-size: 14px; padding: 2px 4px; }

  /* Score grid */
  .scores-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }
  .score-cell {
    background: #0f3460; border: 1px solid #1a4a80;
    border-radius: 8px; padding: 8px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .score-cell-name {
    font-size: 12px; font-weight: 600; color: #a0b0d0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    width: 100%; text-align: center;
  }
  .score-cell input {
    width: 100% !important; background: transparent !important;
    border: none !important; border-bottom: 1px solid #1a4a80 !important;
    border-radius: 0 !important; padding: 4px 6px !important;
    font-size: 18px !important; font-weight: 700 !important;
    text-align: center !important; color: #e0e0e0 !important;
  }
  .score-cell input:focus { outline: none; border-bottom-color: #e94560 !important; }
  .score-cell input[readonly] { color: #506080 !important; opacity: 1 !important; }

  /* Dropdown overlay */
  .dropdown-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end;
  }
  .dropdown-overlay.open { display: flex; }
  .dropdown-sheet {
    background: #16213e; border-radius: 16px 16px 0 0;
    width: 100%; max-height: 70vh; overflow-y: auto;
    padding: 16px; border-top: 2px solid #e94560;
  }
  .dropdown-sheet h3 { font-size: 14px; font-weight: 700; color: #e0e0e0; margin-bottom: 12px; text-align: center; }
  .dropdown-option {
    padding: 12px; border-radius: 8px; font-size: 15px;
    color: #e0e0e0; cursor: pointer; display: flex; align-items: center; gap: 10px;
  }
  .dropdown-option:active { background: #0f3460; }
  .dropdown-option.selected { background: #1a3a60; color: #e94560; font-weight: 600; }
  .dropdown-option .check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #506080; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 11px;
  }
  .dropdown-option.selected .check { background: #e94560; border-color: #e94560; color: white; }
  .dropdown-done {
    margin-top: 12px; width: 100%; background: #e94560; color: white;
    border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
  }

  /* Status */
  .status-banner {
    display: none; border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-bottom: 12px; text-align: center;
  }
  .status-banner.visible { display: block; background: #0f3460; border: 1px solid #1a4a80; color: #a0c0e0; }
  .status-banner.error   { background: #3a0f1e !important; border-color: #e94560 !important; color: #ff8080 !important; }
  .status-banner.success { background: #0f3a1e !important; border-color: #40e094 !important; color: #80ffb0 !important; }

  .submit-btn {
    width: 100%; background: linear-gradient(135deg, #e94560, #c03050);
    color: white; border: none; border-radius: 12px;
    padding: 16px; font-size: 17px; font-weight: 700;
    letter-spacing: 0.5px; cursor: pointer; margin-top: 4px;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }


  /* Win/Lose toggle */
  .winlose-toggle {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .winlose-btn {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 2px solid #1a4a80;
    background: #0f3460;
    color: #a0b0d0;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .winlose-btn.win.active  { background: #0f3a1e; border-color: #40e094; color: #80ffb0; }
  .winlose-btn.lose.active { background: #3a0f1e; border-color: #e94560; color: #ff8080; }

  /* Recent plays */
  .recent-row td {
    padding: 8px 4px; font-size: 13px;
    border-bottom: 1px solid #0f3460; vertical-align: middle;
  }
  .recent-row:last-child td { border-bottom: none; }
  .recent-header td {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: #e94560; padding: 0 4px 8px;
  }
  .recent-date { color: #7090b0; }
  .recent-winner { color: #e0e0e0; font-weight: 600; }
  .recent-score { color: #a0b0d0; text-align: right; }
</style>
</head>
<body>

<div class="header">
  <h1>🎲 Board Game Tracker</h1>
  <p>Log your session</p>
</div>

<div class="bg-art" id="bgArt"></div>

<div class="form-body">

  <div class="status-banner" id="statusBanner"></div>

  <!-- Session -->
  <div class="section">
    <div class="section-title">Session</div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="fieldDate">
    </div>
    <div class="field">
      <label>Board Game</label>
      <select id="fieldGame" onchange="onGameChange()">
        <option value="">Loading games…</option>
      </select>
    </div>
  </div>

  <!-- Game History -->
  <div class="section" id="sectionStats" style="display:none">
    <div class="section-title">Game History</div>
    <div class="auto-field">
      <div class="stat-box"><div class="stat-label">Last Played</div><div class="stat-value" id="valLastPlayed">—</div></div>
      <div class="stat-box"><div class="stat-label">Total Plays</div><div class="stat-value" id="valTotalPlays">—</div></div>
      <div class="stat-box"><div class="stat-label">Top Winner</div><div class="stat-value" id="valTopWinner">—</div></div>
    </div>
  </div>

  <!-- Dynamic game-specific fields -->
  <div class="section" id="sectionExtra" style="display:none">
    <div class="section-title" id="extraTitle">Game Details</div>
    <div id="extraFields"></div>
  </div>

  <!-- Players -->
  <div class="section">
    <div class="section-title">Players</div>
    <div class="chip-container" id="playersContainer" onclick="openMultiSelect('players')">
      <span class="chip-placeholder" id="playersPlaceholder">Select players…</span>
    </div>
  </div>

  <!-- Result -->
  <div class="section" id="resultSection" style="display:none">
    <div class="section-title">Result</div>
    <div class="scores-grid" id="scoresContainer"></div>
    <div class="field">
      <label>Winner</label>
      <input type="text" id="fieldWinner" readonly placeholder="Auto-filled from scores…">
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitForm()">Submit Session</button>

  <!-- Recent Plays -->
  <div class="section" id="recentSection" style="margin-top:12px;display:none">
    <div class="section-title" id="recentTitle">Recent Plays</div>
    <table id="recentTable" style="width:100%;border-collapse:collapse"></table>
    <div id="loadMoreWrap" style="text-align:center;margin-top:10px;display:none">
      <a href="#" onclick="loadMore(event)" style="color:#e94560;font-size:13px;text-decoration:none">Load more…</a>
    </div>
  </div>

</div>

<!-- Multi-select / dropdown overlay -->
<div class="dropdown-overlay" id="dropdownOverlay" onclick="closeDropdownIfOutside(event)">
  <div class="dropdown-sheet">
    <h3 id="dropdownTitle"></h3>
    <div id="dropdownOptions"></div>
    <button class="dropdown-done" onclick="closeMultiSelect()">Done</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwIqye5UJq_gaz8RVFQaQxiozN4t5LAjYOgoh_m2AlP3R7yzUOS0Msmn_KxVD-_2V4l/exec';

let allPlayers = [], allGames = [], selectedPlayers = [];
let currentDropdown = null, currentDropdownField = null;
let currentGameData = null;
// Holds selected values for dynamic multiselect fields: { fieldLabel: [values] }
let extraMultiSelects = {};

// ─── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('fieldDate').value = `${yyyy}-${mm}-${dd}`;
  loadFromSheet();
});

async function loadFromSheet() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getConfig`);
    const data = await res.json();
    allGames = data.games;
    allPlayers = data.players;
    populateGameDropdown();
  } catch(e) {
    showStatus('Could not load data from sheet. Check your Apps Script deployment.', true);
  }
}

function populateGameDropdown() {
  const sel = document.getElementById('fieldGame');
  sel.innerHTML = '<option value="">Select a game…</option>';
  allGames.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.name; opt.textContent = g.name;
    sel.appendChild(opt);
  });
}

// ─── GAME CHANGE ──────────────────────────────────────────
async function onGameChange() {
  const gameName = document.getElementById('fieldGame').value;

  // Hide dependent sections
  document.getElementById('sectionStats').style.display = 'none';
  document.getElementById('sectionExtra').style.display = 'none';
  document.getElementById('recentSection').style.display = 'none';
  extraMultiSelects = {};

  if (!gameName) return;

  const game = allGames.find(g => g.name === gameName);
  currentGameData = game;
  setBackgroundImage(game?.imageUrl || '');

  // Build extra fields
  buildExtraFields(game);

  // Load stats
  document.getElementById('sectionStats').style.display = 'block';
  ['valLastPlayed','valTotalPlays','valTopWinner'].forEach(id => document.getElementById(id).textContent = '…');
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getStats&game=${encodeURIComponent(gameName)}`);
    const stats = await res.json();
    document.getElementById('valLastPlayed').textContent = stats.lastPlayed || '—';
    document.getElementById('valTotalPlays').textContent = stats.totalPlays ?? '0';
    document.getElementById('valTopWinner').textContent = stats.topWinner || '—';
  } catch(e) {
    ['valLastPlayed','valTotalPlays','valTopWinner'].forEach(id => document.getElementById(id).textContent = '—');
  }

  // Refresh scores and recent plays
  if (selectedPlayers.length > 0) updateScores();
  allSessions = []; shownCount = 0; loadRecentPlays();
}

// ─── DYNAMIC EXTRA FIELDS ─────────────────────────────────
function buildExtraFields(game) {
  const fields = game?.extraFields || [];
  if (fields.length === 0) return;

  const section = document.getElementById('sectionExtra');
  const container = document.getElementById('extraFields');
  const title = document.getElementById('extraTitle');

  title.textContent = `${shortenGame(game.name)} Details`;
  container.innerHTML = '';
  extraMultiSelects = {};

  fields.forEach((field, idx) => {
    const safeKey = fieldKey(field.label);
    const div = document.createElement('div');
    div.className = 'field';

    if (field.type === 'dropdown') {
      div.innerHTML = `
        <label>${field.label}</label>
        <select id="extra-${safeKey}">
          <option value="">Select…</option>
          ${field.options.map(o => `<option>${o}</option>`).join('')}
        </select>`;

    } else if (field.type === 'multiselect') {
      extraMultiSelects[safeKey] = [];
      div.innerHTML = `
        <label>${field.label}</label>
        <div class="chip-container" id="extra-chips-${safeKey}"
             onclick="openExtraMultiSelect('${safeKey}', '${field.label}', ${idx})">
          <span class="chip-placeholder" id="extra-ph-${safeKey}">Select…</span>
        </div>`;

    } else if (field.type === 'text') {
      div.innerHTML = `
        <label>${field.label}</label>
        <input type="text" id="extra-${safeKey}" placeholder="">`;

    } else if (field.type === 'number') {
      div.innerHTML = `
        <label>${field.label}</label>
        <input type="number" id="extra-${safeKey}" placeholder="">`;
    }

    container.appendChild(div);
  });

  section.style.display = 'block';
}

function fieldKey(label) {
  return label.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
}

// ─── MULTI-SELECT (players + dynamic extra fields) ─────────
function openMultiSelect(type) {
  currentDropdown = type;
  currentDropdownField = null;
  const title = document.getElementById('dropdownTitle');
  title.textContent = 'Select Players';
  renderDropdownOptions(allPlayers, selectedPlayers);
  document.getElementById('dropdownOverlay').classList.add('open');
}

function openExtraMultiSelect(safeKey, label, fieldIdx) {
  currentDropdown = 'extra';
  currentDropdownField = safeKey;
  document.getElementById('dropdownTitle').textContent = label;
  const field = currentGameData.extraFields[fieldIdx];
  renderDropdownOptions(field.options, extraMultiSelects[safeKey] || []);
  document.getElementById('dropdownOverlay').classList.add('open');
}

function renderDropdownOptions(items, selected) {
  const container = document.getElementById('dropdownOptions');
  container.innerHTML = '';
  items.forEach(item => {
    const isSelected = selected.includes(item);
    const div = document.createElement('div');
    div.className = 'dropdown-option' + (isSelected ? ' selected' : '');
    div.innerHTML = `<div class="check">${isSelected ? '✓' : ''}</div><span>${item}</span>`;
    div.onclick = () => {
      const arr = currentDropdown === 'players' ? selectedPlayers : extraMultiSelects[currentDropdownField];
      const idx = arr.indexOf(item);
      if (idx > -1) { arr.splice(idx, 1); div.classList.remove('selected'); div.querySelector('.check').textContent = ''; }
      else { arr.push(item); div.classList.add('selected'); div.querySelector('.check').textContent = '✓'; }
    };
    container.appendChild(div);
  });
}

function closeMultiSelect() {
  document.getElementById('dropdownOverlay').classList.remove('open');
  if (currentDropdown === 'players') {
    renderPlayerChips();
    updateScores();
  } else if (currentDropdown === 'extra' && currentDropdownField) {
    renderExtraChips(currentDropdownField);
  }
  currentDropdown = null;
  currentDropdownField = null;
}

function closeDropdownIfOutside(e) {
  if (e.target === document.getElementById('dropdownOverlay')) closeMultiSelect();
}

function renderPlayerChips() {
  const container = document.getElementById('playersContainer');
  container.innerHTML = '';
  if (selectedPlayers.length === 0) {
    container.innerHTML = '<span class="chip-placeholder" id="playersPlaceholder">Select players…</span>';
    return;
  }
  selectedPlayers.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${item}<span class="remove" onclick="removePlayer(event,'${item}')">×</span>`;
    container.appendChild(chip);
  });
}

function renderExtraChips(safeKey) {
  const arr = extraMultiSelects[safeKey] || [];
  const container = document.getElementById(`extra-chips-${safeKey}`);
  if (!container) return;
  container.innerHTML = '';
  if (arr.length === 0) {
    container.innerHTML = `<span class="chip-placeholder" id="extra-ph-${safeKey}">Select…</span>`;
    return;
  }
  arr.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${item}<span class="remove" onclick="removeExtraChip(event,'${safeKey}','${item}')">×</span>`;
    container.appendChild(chip);
  });
}

function removePlayer(e, value) {
  e.stopPropagation();
  selectedPlayers = selectedPlayers.filter(p => p !== value);
  renderPlayerChips();
  updateScores();
}

function removeExtraChip(e, safeKey, value) {
  e.stopPropagation();
  extraMultiSelects[safeKey] = (extraMultiSelects[safeKey] || []).filter(v => v !== value);
  renderExtraChips(safeKey);
}

// ─── SCORES & WIN CONDITIONS ──────────────────────────────
// winCondition: 'score' (default) | 'lowest' | 'winlose' | 'manual'
function getWinCondition() {
  const fields = currentGameData?.extraFields || [];
  const wc = fields.find(f => f.winCondition);
  if (wc) return wc.winCondition;
  if (currentGameData?.coop) return 'winlose'; // coop default
  return 'score';
}

function updateScores() {
  const resultSection = document.getElementById('resultSection');
  const container = document.getElementById('scoresContainer');
  const winnerField = document.getElementById('fieldWinner');

  if (selectedPlayers.length === 0) { resultSection.style.display = 'none'; return; }

  resultSection.style.display = 'block';
  container.innerHTML = '';
  winnerField.value = '';

  const wc = getWinCondition();

  if (wc === 'winlose') {
    // Win/Lose toggle — no scores, no individual winner
    container.innerHTML = `
      <div class="winlose-toggle" style="grid-column:1/-1">
        <div class="winlose-btn win" id="btnWin" onclick="setWinLose('Win')">🏆 Win</div>
        <div class="winlose-btn lose" id="btnLose" onclick="setWinLose('Loss')">💀 Loss</div>
      </div>`;
    winnerField.placeholder = 'Select Win or Loss…';

  } else if (wc === 'manual') {
    // No scores — just pick winner from players
    winnerField.readOnly = false;
    winnerField.placeholder = '';
    // Populate as a select... but fieldWinner is an input. Render a select instead.
    container.innerHTML = `
      <div class="field" style="grid-column:1/-1;margin-bottom:0">
        <label>Winner</label>
        <select id="manualWinner" onchange="document.getElementById('fieldWinner').value=this.value">
          <option value="">Select winner…</option>
          ${selectedPlayers.map(p => `<option>${p}</option>`).join('')}
        </select>
      </div>`;
    winnerField.style.display = 'none';
    return; // skip the winner field below

  } else {
    // score or lowest — render per-player score boxes
    selectedPlayers.forEach(player => {
      const cell = document.createElement('div');
      cell.className = 'score-cell';
      const safeId = `score-${player.replace(/\s/g,'_')}`;
      cell.innerHTML = `
        <div class="score-cell-name">${player}</div>
        <input type="number" id="${safeId}" placeholder="—" oninput="autoWinner()">`;
      container.appendChild(cell);
    });
    winnerField.placeholder = wc === 'lowest' ? 'Auto-filled (lowest score)…' : 'Auto-filled from scores…';
  }

  winnerField.style.display = '';
  winnerField.readOnly = true;
}

function setWinLose(result) {
  document.getElementById('btnWin').classList.toggle('active', result === 'Win');
  document.getElementById('btnLose').classList.toggle('active', result === 'Loss');
  document.getElementById('fieldWinner').value = result;
}

function autoWinner() {
  const wc = getWinCondition();
  if (wc === 'winlose' || wc === 'manual') return;

  const scores = {};
  selectedPlayers.forEach(p => {
    const val = document.getElementById(`score-${p.replace(/\s/g,'_')}`)?.value;
    if (val !== '' && val !== undefined) scores[p] = parseFloat(val);
  });

  const filled = Object.entries(scores).filter(([,v]) => !isNaN(v));
  if (filled.length === 0) { document.getElementById('fieldWinner').value = ''; return; }

  const best = wc === 'lowest'
    ? Math.min(...filled.map(([,v]) => v))
    : Math.max(...filled.map(([,v]) => v));
  const winners = filled.filter(([,v]) => v === best).map(([p]) => p);

  document.getElementById('fieldWinner').value = winners.length === 1
    ? winners[0]
    : `TIE! ${winners.join(', ')}`;
}

// ─── SUBMIT ───────────────────────────────────────────────
async function submitForm() {
  const game = document.getElementById('fieldGame').value;
  if (!game) { showStatus('Please select a game.', true); return; }
  if (selectedPlayers.length === 0) { showStatus('Please select at least one player.', true); return; }
  const winner = document.getElementById('fieldWinner').value;
  const wc = getWinCondition();
  if (!winner) {
    if (wc === 'winlose') { showStatus('Please select Win or Loss.', true); return; }
    if (wc === 'manual')  { showStatus('Please select a winner.', true); return; }
    showStatus('Please enter scores to determine a winner.', true); return;
  }

  const scores = {};
  const wcSubmit = getWinCondition();
  if (wcSubmit === 'score' || wcSubmit === 'lowest') {
    selectedPlayers.forEach(p => {
      const val = document.getElementById(`score-${p.replace(/\s/g,'_')}`)?.value;
      if (val) scores[p] = val;
    });
  }

  // Collect extra fields
  const extras = {};
  const fields = currentGameData?.extraFields || [];
  fields.forEach(field => {
    const safeKey = fieldKey(field.label);
    if (field.type === 'multiselect') {
      extras[field.label] = (extraMultiSelects[safeKey] || []).join(', ');
    } else {
      const el = document.getElementById(`extra-${safeKey}`);
      extras[field.label] = el ? el.value : '';
    }
  });

  const payload = {
    date: document.getElementById('fieldDate').value,
    game,
    players: selectedPlayers.join(', '),
    scores: JSON.stringify(scores),
    winner,
    extras: JSON.stringify(extras),
    lastPlayed: document.getElementById('valLastPlayed').textContent,
    totalPlays: document.getElementById('valTotalPlays').textContent,
    topWinner: document.getElementById('valTopWinner').textContent,
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';

  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const result = await res.json();
    if (result.status === 'success') {
      showStatus('✅ Session saved!', false, true);
      resetForm();
    } else throw new Error(result.message);
  } catch(e) {
    showStatus(`Error: ${e.message}`, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Session';
  }
}

function resetForm() {
  document.getElementById('fieldGame').value = '';
  document.getElementById('fieldWinner').value = '';
  selectedPlayers = []; extraMultiSelects = {};
  renderPlayerChips();
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('sectionStats').style.display = 'none';
  document.getElementById('sectionExtra').style.display = 'none';
  document.getElementById('recentSection').style.display = 'none';
  currentGameData = null;
  document.getElementById('fieldWinner').style.display = '';
  document.getElementById('fieldWinner').readOnly = true;
  setBackgroundImage('');
}

// ─── STATUS ───────────────────────────────────────────────
function showStatus(msg, isError = false, isSuccess = false) {
  const el = document.getElementById('statusBanner');
  el.textContent = msg;
  el.className = 'status-banner visible' + (isError ? ' error' : '') + (isSuccess ? ' success' : '');
  if (!isError) setTimeout(() => el.classList.remove('visible'), 4000);
}

// ─── RECENT PLAYS ─────────────────────────────────────────
let allSessions = [], shownCount = 0;
const PAGE_SIZE = 5;

async function loadRecentPlays() {
  const gameName = document.getElementById('fieldGame').value;
  if (!gameName) { document.getElementById('recentSection').style.display = 'none'; return; }
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getSessions&game=${encodeURIComponent(gameName)}`);
    const data = await res.json();
    allSessions = data.sessions.sort((a, b) => new Date(b.date) - new Date(a.date));
    shownCount = 0;
    renderRecentPlays();
  } catch(e) { /* silently fail */ }
}

function renderRecentPlays() {
  const section = document.getElementById('recentSection');
  const table = document.getElementById('recentTable');
  const loadMoreWrap = document.getElementById('loadMoreWrap');

  if (allSessions.length === 0) { section.style.display = 'none'; return; }

  section.style.display = 'block';
  document.getElementById('recentTitle').textContent =
    `Previous Plays — ${shortenGame(document.getElementById('fieldGame').value)}`;

  const toShow = allSessions.slice(0, shownCount + PAGE_SIZE);
  shownCount = toShow.length;
  table.innerHTML = '';

  const header = document.createElement('tr');
  header.className = 'recent-header';
  header.innerHTML = '<td>Date</td><td>Winner</td><td class="recent-score">Score</td>';
  table.appendChild(header);

  toShow.forEach(s => {
    const row = document.createElement('tr');
    row.className = 'recent-row';
    row.innerHTML = `
      <td class="recent-date">${s.date ? formatDate(s.date) : '—'}</td>
      <td class="recent-winner">${s.winner || '—'}</td>
      <td class="recent-score">${getWinnerScore(s) || '—'}</td>`;
    table.appendChild(row);
  });

  loadMoreWrap.style.display = shownCount < allSessions.length ? 'block' : 'none';
}

function loadMore(e) { e.preventDefault(); renderRecentPlays(); }

function formatDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short', year: '2-digit' });
}

function shortenGame(name) {
  if (!name) return '';
  if (name.startsWith('SETI')) return 'SETI';
  if (name.length > 16) return name.substring(0, 15) + '…';
  return name;
}

function getWinnerScore(session) {
  if (!session.scores || !session.winner) return '';
  if (session.winner.startsWith('TIE!') || session.winner === 'N/A') return '';
  try {
    const scores = JSON.parse(session.scores);
    const val = scores[session.winner];
    return val !== undefined ? val : '';
  } catch(e) { return ''; }
}
// ─── BACKGROUND ART ───────────────────────────────────────
function setBackgroundImage(url) {
  const el = document.getElementById('bgArt');
  if (!url) {
    el.classList.remove('visible');
    setTimeout(() => { el.style.backgroundImage = ''; }, 800);
    return;
  }
  // Preload to avoid flash
  const img = new Image();
  img.onload = () => {
    el.style.backgroundImage = `url('${url}')`;
    el.classList.add('visible');
  };
  img.onerror = () => {
    // Image failed (e.g. CORS) — just hide
    el.classList.remove('visible');
  };
  img.src = url;
}

</script>
